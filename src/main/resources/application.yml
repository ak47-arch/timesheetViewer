spring:
  application:
    name: excel-viewer
  datasource:
    url: "jdbc:h2:mem:timesheetviewerdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE"
    driver-class-name: org.h2.Driver
    username: sa
    password: ''
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate.format_sql: true
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: 8082

logging:
  level:
    com.timesheet.validator: DEBUG
    org.springframework.security: WARN
    org.liquibase: WARN

# ─────────────────────────────────────────────────────────────────────────────
# MASTER / REFERENCE DATA — edit here and restart to apply
# ─────────────────────────────────────────────────────────────────────────────
app:
  rules:
    # How often the catalog reloads rule config from the database (ms).
    refresh-ms: 60000
    # true → overwrite DB enabled flags from YAML on every startup.
    # false → DB stays authoritative for enable/disable across restarts.
    reseed-on-start: false
    definitions:
      # ── Timesheet sheet (user-selectable per upload) ──────────────────────
      - { ruleId: TS-01, sheet: Timesheet, description: "Max 8 hrs/day per resource",    severity: CRITICAL, enabled: true,  alwaysOn: false, sortOrder: 1 }
      - { ruleId: TS-02, sheet: Timesheet, description: "No weekend entries",             severity: CRITICAL, enabled: true,  alwaysOn: false, sortOrder: 2 }
      - { ruleId: TS-03, sheet: Timesheet, description: "No public holiday entries",      severity: CRITICAL, enabled: true,  alwaysOn: false, sortOrder: 3 }
      - { ruleId: TS-04, sheet: Timesheet, description: "Hours must be positive",         severity: CRITICAL, enabled: true,  alwaysOn: false, sortOrder: 4 }
      - { ruleId: TS-05, sheet: Timesheet, description: "Resource must be in roster",     severity: WARNING,  enabled: true,  alwaysOn: false, sortOrder: 5 }
      - { ruleId: TS-06, sheet: Timesheet, description: "SOW must match expected",        severity: CRITICAL, enabled: true,  alwaysOn: false, sortOrder: 6 }
      - { ruleId: TS-07, sheet: Timesheet, description: "Date within engagement period",  severity: WARNING,  enabled: true,  alwaysOn: false, sortOrder: 7 }
      - { ruleId: TS-08, sheet: Timesheet, description: "All fields are mandatory",       severity: CRITICAL, enabled: true,  alwaysOn: false, sortOrder: 8 }
      # ── Pivot sheet (always-on reconciliation checks) ─────────────────────
      - { ruleId: PS-01, sheet: Pivot,     description: "Resource present in Pivot sheet",       severity: CRITICAL, enabled: true, alwaysOn: true, sortOrder: 9 }
      - { ruleId: PS-02, sheet: Pivot,     description: "Employee total hours match Timesheet",  severity: CRITICAL, enabled: true, alwaysOn: true, sortOrder: 10 }
      - { ruleId: PS-03, sheet: Pivot,     description: "Date-wise total hours match Timesheet", severity: CRITICAL, enabled: true, alwaysOn: true, sortOrder: 11 }
      - { ruleId: PS-04, sheet: Pivot,     description: "Employee x date hours match Timesheet", severity: CRITICAL, enabled: true, alwaysOn: true, sortOrder: 12 }
      - { ruleId: PS-05, sheet: Pivot,     description: "Pivot grand total is correct",          severity: CRITICAL, enabled: true, alwaysOn: true, sortOrder: 13 }
      - { ruleId: PS-06, sheet: Pivot,     description: "Working days match Timesheet",          severity: CRITICAL, enabled: true, alwaysOn: true, sortOrder: 14 }


      # Projectwise sheet (reconciliation checks)

      - rule-id: PW-001
        sheet: Projectwise
        description: "Project total hours match validated Timesheet"
        severity: CRITICAL
        enabled: true
        always-on: false
        sort-order: 15

      - rule-id: PW-002
        sheet: Projectwise
        description: "Sub Project total hours match validated Timesheet"
        severity: CRITICAL
        enabled: true
        always-on: false
        sort-order: 16

      - rule-id: PW-003
        sheet: Projectwise
        description: "Project Code total hours match validated Timesheet"
        severity: CRITICAL
        enabled: true
        always-on: false
        sort-order: 17

