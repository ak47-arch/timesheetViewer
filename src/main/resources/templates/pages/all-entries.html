<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="fragments/layout :: head('All Entries')"></head>
<body>
<nav th:replace="fragments/layout :: navbar"></nav>
<main class="main-content">
    <div class="page-header">
        <div>
            <h1><i class="fa fa-users"></i> All Timesheet Entries</h1>
            <p class="subtitle" th:text="${#lists.size(entries)} + ' total entries'"></p>
        </div>
        <a th:href="@{/timesheet}" class="btn btn-secondary">
            <i class="fa fa-arrow-left"></i> Back
        </a>
    </div>
    <div class="card">
        <div class="card-body p-0">
            <table class="data-table">
                <thead>
                <tr><th>Date</th><th>Resource</th><th>Project</th><th>Sub-Project</th>
                    <th>Code</th><th>Hours</th><th>Task</th><th>Submitted By</th><th>Status</th></tr>
                </thead>
                <tbody>
                <tr th:each="e : ${entries}">
                    <td th:text="${e.entryDate}">-</td>
                    <td><strong th:text="${e.resourceName}">-</strong></td>
                    <td th:text="${e.project}">-</td>
                    <td th:text="${e.subProject}">-</td>
                    <td><code th:text="${e.projectCode}">-</code></td>
                    <td><strong th:text="${e.hours}">0</strong></td>
                    <td th:text="${e.task != null ? #strings.abbreviate(e.task,40) : '-'}">-</td>
                    <td th:text="${e.submittedBy}">-</td>
                    <td><span class="badge badge-green" th:text="${e.status}">-</span></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
<footer th:replace="fragments/layout :: footer"></footer>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
