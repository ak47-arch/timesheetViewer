<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="fragments/layout :: head('Admin — Holidays')"></head>
<body>
<nav th:replace="fragments/layout :: navbar"></nav>
<main class="main-content">
    <div class="page-header">
        <div>
            <h1><i class="fa fa-calendar-xmark"></i> Public Holidays</h1>
            <p class="subtitle" th:text="${#lists.size(holidays)} + ' holidays configured'"></p>
        </div>
        <div class="page-actions">
            <a th:href="@{/admin}" class="btn btn-secondary"><i class="fa fa-arrow-left"></i> Admin</a>
            <a th:href="@{/admin/holidays/new}" class="btn btn-success"><i class="fa fa-plus"></i> Add Holiday</a>
        </div>
    </div>
    <div th:if="${success}" class="alert alert-success"><i class="fa fa-circle-check"></i> <span th:text="${success}"></span></div>

    <div class="card">
        <div class="card-body p-0">
            <table class="data-table">
                <thead>
                <tr><th>Date</th><th>Holiday Name</th><th>Country</th><th>Notes</th><th>Status</th><th>Actions</th></tr>
                </thead>
                <tbody>
                <tr th:each="h : ${holidays}" th:classappend="${!h.active} ? ' row-disabled' : ''">
                    <td><span class="badge badge-orange" th:text="${h.holidayDate}"></span></td>
                    <td><strong th:text="${h.holidayName}"></strong></td>
                    <td th:text="${h.countryCode}">IN</td>
                    <td class="text-muted" th:text="${h.notes}">—</td>
                    <td>
                        <span th:if="${h.active}" class="badge badge-green">
                            <i class="fa fa-circle-check"></i> Enabled
                        </span>
                        <span th:unless="${h.active}" class="badge badge-gray">
                            <i class="fa fa-ban"></i> Disabled
                        </span>
                    </td>
                    <td class="action-cell">
                        <form th:action="@{/admin/holidays/toggle/{id}(id=${h.id})}" method="post"
                              style="display:inline">
                            <button type="submit"
                                    th:class="${h.active} ? 'btn btn-sm btn-secondary' : 'btn btn-sm btn-success'">
                                <i th:class="${h.active} ? 'fa fa-toggle-off' : 'fa fa-toggle-on'"></i>
                                <span th:text="${h.active} ? 'Disable' : 'Enable'">Disable</span>
                            </button>
                        </form>
                        <a th:href="@{/admin/holidays/edit/{id}(id=${h.id})}" class="btn btn-sm btn-primary">
                            <i class="fa fa-pen"></i> Edit
                        </a>
                        <form th:action="@{/admin/holidays/delete/{id}(id=${h.id})}" method="post"
                              style="display:inline"
                              th:attr="data-name=${h.holidayName}" onsubmit="return confirm('Delete ' + this.dataset.name + '?')" >
                            <button type="submit" class="btn btn-sm btn-danger"><i class="fa fa-trash"></i></button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
<footer th:replace="fragments/layout :: footer"></footer>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
