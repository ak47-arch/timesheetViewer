<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="fragments/layout :: head('Admin — Holiday Form')"></head>
<body>
<nav th:replace="fragments/layout :: navbar"></nav>
<main class="main-content" style="max-width:640px">
    <div class="page-header">
        <div>
            <h1 th:text="${editMode} ? '✏ Edit Holiday' : '➕ Add Holiday'"></h1>
        </div>
        <a th:href="@{/admin/holidays}" class="btn btn-secondary"><i class="fa fa-arrow-left"></i> Back</a>
    </div>
    <div class="card">
        <div class="card-body">
            <form th:action="@{/admin/holidays/save}" method="post">
                <input type="hidden" name="id" th:value="${holiday.id}"/>
                <div class="form-row">
                    <div class="form-group">
                        <label class="required">Holiday Date</label>
                        <input type="date" name="holidayDate" class="form-input"
                               th:value="${holiday.holidayDate}" required/>
                    </div>
                    <div class="form-group">
                        <label class="required">Holiday Name</label>
                        <input type="text" name="holidayName" class="form-input"
                               th:value="${holiday.holidayName}" placeholder="e.g. Republic Day" required/>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Country Code</label>
                        <select name="countryCode" class="form-input">
                            <option value="IN" th:selected="${holiday.countryCode == 'IN' or holiday.countryCode == null}">IN — India</option>
                            <option value="US" th:selected="${holiday.countryCode == 'US'}">US — United States</option>
                            <option value="GB" th:selected="${holiday.countryCode == 'GB'}">GB — United Kingdom</option>
                            <option value="AU" th:selected="${holiday.countryCode == 'AU'}">AU — Australia</option>
                            <option value="QA" th:selected="${holiday.countryCode == 'QA'}">QA — Qatar</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Notes</label>
                        <input type="text" name="notes" class="form-input"
                               th:value="${holiday.notes}" placeholder="Optional notes"/>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-success"><i class="fa fa-save"></i> Save Holiday</button>
                    <a th:href="@{/admin/holidays}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</main>
<footer th:replace="fragments/layout :: footer"></footer>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
